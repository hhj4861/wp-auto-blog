          # LLM Fallbacks
          GOOGLE_AI_API_KEY=${{ secrets.GOOGLE_AI_API_KEY }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}

          # Image APIs
          UNSPLASH_ACCESS_KEY=${{ secrets.UNSPLASH_ACCESS_KEY }}
          PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}

          # WordPress - General Blog (trendpulse.blog)
          WP_GENERAL_URL=${{ secrets.WP_GENERAL_URL }}
          WP_GENERAL_USERNAME=${{ secrets.WP_GENERAL_USERNAME }}
          WP_GENERAL_APP_PASSWORD=${{ secrets.WP_GENERAL_APP_PASSWORD }}
          EOF

      - name: Run pipeline (Queue Mode - 머니 키워드 큐)
        timeout-minutes: 30
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          python -m src.main --mode general --from-queue --auto-publish

      - name: Commit queue and registry updates
        if: success()
        continue-on-error: true
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          for f in data/topic_queue_general.json data/post_registry_general.json; do
            [ -f "$f" ] && git add "$f"
          done
          if git diff --staged --quiet; then
            echo "No queue/registry changes to commit"
            exit 0
          fi
          git commit -m "chore: update topic queue and registry [skip ci]"
          for i in 1 2 3 4 5; do
            if git push origin main; then
              echo "Push succeeded on attempt $i"
              exit 0
            fi
            echo "Push failed; rebasing onto latest origin/main (attempt $i)..."
            git pull --rebase --autostash origin main || { git rebase --abort 2>/dev/null || true; }
            sleep $((i * 2))
          done
          echo "Warning: Failed to push after 5 attempts, but post was created successfully"

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-queue-${{ github.run_id }}
          path: data/logs/
          retention-days: 7

  # If any posting job failed (typically a Hostinger edge-WAF 403 that blocks
  # this run's datacenter IP), re-run only the failed jobs. A re-run is assigned
  # a fresh runner with a new egress IP, which clears the intermittent block.
  # Capped at 3 attempts via github.run_attempt to avoid loops.
  retry-on-waf-block:
    needs:
      - post-general
      - post-tech
      - post-kpop
      - post-kbeauty
      - post-kfood
      - post-kfashion
      - post-queue
    if: failure() && github.run_attempt < 3
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Re-run failed jobs on a fresh runner
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Attempt ${{ github.run_attempt }} had failures; re-running failed jobs on a new runner (new IP)."
          sleep 30
          gh run rerun ${{ github.run_id }} --failed --repo ${{ github.repository }}
