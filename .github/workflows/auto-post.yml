      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-tech-${{ github.run_id }}
          path: data/logs/
          retention-days: 7

  # ============================================
  # K-Culture Categories (bytepulse.io)
