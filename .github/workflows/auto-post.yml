name: Auto Blog Post

permissions:
  contents: write

on:
  # Manual trigger
  workflow_dispatch:
    inputs:
      mode:
        description: 'Blog mode'
        required: true
        default: 'general'
        type: choice
        options:
          - general
          - tech
          - kculture
          - both
      topic:
        description: 'Specific topic (optional, skips trend detection)'
        required: false
        type: string
      publish:
        description: 'Publish immediately'
        required: false
        default: true
        type: boolean
      category:
        description: 'Filter by category (optional)'
        required: false
        type: string

  # Scheduled runs (UTC time)
  # GitHub Actions 지연 고려하여 30분 앞당김
  schedule:
    # === General Blog (trendpulse.blog) - KST 기준 ===
    # 오전: 23:30 UTC (08:30 KST)
    - cron: '30 23 * * *'
    # 오후: 10:30 UTC (19:30 KST)
    - cron: '30 10 * * *'
    # 외항사 포스팅: 02:00 UTC (11:00 KST) - 월/수/금
    - cron: '0 2 * * 1,3,5'

    # === K-Culture (bytepulse.io) - US EST 기준 ===
    # K-Pop: 4회/주 (월/수/금/일) - 트래픽 최대화
    # 20:00 EST = 01:00 UTC
    - cron: '0 1 * * 0,1,3,5'  # kpop: 일/월/수/금

    # K-Beauty: 3회/주 (화/목/토) - 수익 최대화
    # 09:00 EST = 14:00 UTC
    - cron: '0 14 * * 2,4,6'  # kbeauty: 화/목/토

    # K-Food: 2회/주 (화/토)
    # 12:00 EST = 17:00 UTC
    - cron: '0 17 * * 2,6'  # kfood: 화/토

    # K-Fashion: 2회/주 (목/일)
    # 15:00 EST = 20:00 UTC
    - cron: '0 20 * * 0,4'  # kfashion: 일/목

jobs:
  post-general:
    # General 스케줄: 23:30 UTC, 10:30 UTC
    # 외항사/K-Culture 스케줄에서는 실행하지 않음
    if: |
      github.event_name == 'workflow_dispatch' && (github.event.inputs.mode == 'general' || github.event.inputs.mode == 'both') ||
      (github.event_name == 'schedule' && (github.event.schedule == '30 23 * * *' || github.event.schedule == '30 10 * * *'))
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create .env file
        run: |
          cat << EOF > .env
          # Claude Agent SDK (OAuth token)
          CLAUDE_CODE_OAUTH_TOKEN=${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # LLM Fallbacks
          GOOGLE_AI_API_KEY=${{ secrets.GOOGLE_AI_API_KEY }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}

          # Image APIs
          UNSPLASH_ACCESS_KEY=${{ secrets.UNSPLASH_ACCESS_KEY }}
          PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}

          # WordPress - General Blog (trendpulse.blog)
          WP_GENERAL_URL=${{ secrets.WP_GENERAL_URL }}
          WP_GENERAL_USERNAME=${{ secrets.WP_GENERAL_USERNAME }}
          WP_GENERAL_APP_PASSWORD=${{ secrets.WP_GENERAL_APP_PASSWORD }}
          EOF

      - name: Run pipeline (General Blog - trendpulse.blog)
        timeout-minutes: 15
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          # Build command with optional flags
          CMD="python -m src.main --mode general --max-posts 1"

          # Add specific topic if provided (skips trend detection)
          if [ -n "${{ github.event.inputs.topic }}" ]; then
            CMD="$CMD --topic '${{ github.event.inputs.topic }}'"
          fi

          # Add publish flag: always publish for scheduled runs, or if manually requested
          if [ "${{ github.event_name }}" == "schedule" ] || [ "${{ github.event.inputs.publish }}" == "true" ]; then
            CMD="$CMD --auto-publish"
          fi

          # Add category filter if specified (manual trigger only)
          if [ -n "${{ github.event.inputs.category }}" ]; then
            CMD="$CMD --category '${{ github.event.inputs.category }}'"
          fi

          echo "Running: $CMD"
          eval $CMD

      - name: Commit post registry
        if: success()
        continue-on-error: true
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          if [ -f "data/post_registry_general.json" ]; then
            git pull --rebase origin main || true
            git add data/post_registry_general.json
            git diff --staged --quiet || git commit -m "chore: update general post registry [skip ci]"
            git push || echo "Warning: Failed to push registry, but post was created successfully"
          fi

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-general-${{ github.run_id }}
          path: data/logs/
          retention-days: 7

  post-tech:
    # Tech 스케줄: 23:30 UTC, 10:30 UTC (General과 동일 시간)
    # bytepulse.io Tech 카테고리
    if: |
      github.event_name == 'workflow_dispatch' && (github.event.inputs.mode == 'tech' || github.event.inputs.mode == 'both') ||
      (github.event_name == 'schedule' && (github.event.schedule == '30 23 * * *' || github.event.schedule == '30 10 * * *'))
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

