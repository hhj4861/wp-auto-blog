    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create .env file
        run: |
          cat << EOF > .env
          CLAUDE_CODE_OAUTH_TOKEN=${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GOOGLE_AI_API_KEY=${{ secrets.GOOGLE_AI_API_KEY }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          UNSPLASH_ACCESS_KEY=${{ secrets.UNSPLASH_ACCESS_KEY }}
          PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_API_KEY=${{ secrets.YOUTUBE_API_KEY }}
          WP_KCULTURE_URL=${{ secrets.WP_TECH_URL }}
          WP_KCULTURE_USERNAME=${{ secrets.WP_TECH_USERNAME }}
          WP_KCULTURE_APP_PASSWORD=${{ secrets.WP_TECH_APP_PASSWORD }}
          EOF

      - name: Run pipeline (K-Pop)
        timeout-minutes: 15
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          CMD="python -m src.main --mode kculture --category K-Pop --max-posts 1 --auto-publish"
          if [ -n "${{ github.event.inputs.topic }}" ]; then
            CMD="$CMD --topic '${{ github.event.inputs.topic }}'"
          fi
          echo "Running: $CMD"
          eval $CMD

      - name: Commit post registry
        if: success()
        continue-on-error: true
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/post_registry_kculture.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update kculture post registry (K-Pop) [skip ci]"
            for i in 1 2 3 4 5; do
              git push origin main && break
              git pull --rebase origin main || git reset --hard origin/main
              sleep $((i * 2))
            done
          fi

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-kpop-${{ github.run_id }}
          path: data/logs/
          retention-days: 7

  # K-Beauty: 화/목/금/토 03:00 KST (18:00 UTC 전날)
  post-kbeauty:
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'kculture' && github.event.inputs.category == 'K-Beauty' ||
