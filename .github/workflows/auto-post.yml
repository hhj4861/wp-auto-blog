name: Auto Blog Post

on:
  # Manual trigger
  workflow_dispatch:
    inputs:
      mode:
        description: 'Blog mode'
        required: true
        default: 'general'
        type: choice
        options:
          - general
          - tech
          - both
      publish:
        description: 'Publish immediately'
        required: false
        default: false
        type: boolean
      category:
        description: 'Filter by category (optional)'
        required: false
        type: string

  # Scheduled runs (UTC time)
  schedule:
    # Run at 08:00 UTC (17:00 KST) for general blog
    - cron: '0 8 * * *'
    # Run at 14:00 UTC (23:00 KST) for tech blog
    - cron: '0 14 * * *'

jobs:
  post-general:
    if: |
      github.event_name == 'workflow_dispatch' && (github.event.inputs.mode == 'general' || github.event.inputs.mode == 'both') ||
      github.event_name == 'schedule' && github.event.schedule == '0 8 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create .env file
        run: |
          cat << EOF > .env
          # Claude Agent SDK (OAuth token)
          CLAUDE_CODE_OAUTH_TOKEN=${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # LLM Fallbacks
          GOOGLE_AI_API_KEY=${{ secrets.GOOGLE_AI_API_KEY }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}

          # Image APIs
          UNSPLASH_ACCESS_KEY=${{ secrets.UNSPLASH_ACCESS_KEY }}
          PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}

          # WordPress - General Blog (trendpulse.blog)
          WP_GENERAL_URL=${{ secrets.WP_GENERAL_URL }}
          WP_GENERAL_USERNAME=${{ secrets.WP_GENERAL_USERNAME }}
          WP_GENERAL_APP_PASSWORD=${{ secrets.WP_GENERAL_APP_PASSWORD }}
          EOF

      - name: Run pipeline (General Blog - trendpulse.blog)
        timeout-minutes: 10
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          # Build command with optional flags
          # Uses Claude Agent SDK (claude_agent_query) which reads ANTHROPIC_API_KEY
          CMD="python -m src.main --mode general --max-posts 1"

          # Add publish flag if requested
          if [ "${{ github.event.inputs.publish }}" == "true" ]; then
            CMD="$CMD --auto-publish"
          fi

          # Add category filter if specified
          if [ -n "${{ github.event.inputs.category }}" ]; then
            CMD="$CMD --category '${{ github.event.inputs.category }}'"
          fi

          echo "Running: $CMD"
          eval $CMD

      - name: Commit post registry
        if: success()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          if [ -f "data/post_registry.json" ]; then
            git add data/post_registry.json
            git diff --staged --quiet || git commit -m "chore: update post registry [skip ci]"
            git push
          fi

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-general-${{ github.run_id }}
          path: data/logs/
          retention-days: 7

  post-tech:
    if: |
      github.event_name == 'workflow_dispatch' && (github.event.inputs.mode == 'tech' || github.event.inputs.mode == 'both') ||
      github.event_name == 'schedule' && github.event.schedule == '0 14 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create .env file
        run: |
          cat << EOF > .env
          # Claude Agent SDK (OAuth token)
          CLAUDE_CODE_OAUTH_TOKEN=${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # LLM Fallbacks
          GOOGLE_AI_API_KEY=${{ secrets.GOOGLE_AI_API_KEY }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}

          # Image APIs
          UNSPLASH_ACCESS_KEY=${{ secrets.UNSPLASH_ACCESS_KEY }}
          PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}

          # WordPress - Tech Blog (bytepulse.io)
          WP_TECH_URL=${{ secrets.WP_TECH_URL }}
          WP_TECH_USERNAME=${{ secrets.WP_TECH_USERNAME }}
          WP_TECH_APP_PASSWORD=${{ secrets.WP_TECH_APP_PASSWORD }}
          EOF

      - name: Run pipeline (Tech Blog - bytepulse.io)
        timeout-minutes: 10
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          # Build command with optional flags
          # Uses Claude Agent SDK (claude_agent_query) which reads ANTHROPIC_API_KEY
          CMD="python -m src.main --mode tech --max-posts 1"

          # Add publish flag if requested
          if [ "${{ github.event.inputs.publish }}" == "true" ]; then
            CMD="$CMD --auto-publish"
          fi

          # Add category filter if specified
          if [ -n "${{ github.event.inputs.category }}" ]; then
            CMD="$CMD --category '${{ github.event.inputs.category }}'"
          fi

          echo "Running: $CMD"
          eval $CMD

      - name: Commit post registry
        if: success()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          if [ -f "data/post_registry.json" ]; then
            git add data/post_registry.json
            git diff --staged --quiet || git commit -m "chore: update post registry [skip ci]"
            git push
          fi

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-tech-${{ github.run_id }}
          path: data/logs/
          retention-days: 7
