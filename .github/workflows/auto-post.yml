        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          python -m src.main --mode general --from-queue --auto-publish

      - name: Commit queue and registry updates
        if: success()
