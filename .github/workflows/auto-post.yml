          retention-days: 7

  # K-Fashion: 목/금/토 04:00 KST (19:00 UTC 전날)
  post-kfashion:
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'kculture' && github.event.inputs.category == 'K-Fashion' ||
      (github.event_name == 'schedule' && github.event.schedule == '0 19 * * 3,4,5')
    runs-on: ubuntu-latest
    timeout-minutes: 20

