          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update kculture post registry (K-Beauty) [skip ci]"
            for i in 1 2 3 4 5; do
              git push origin main && break
              git pull --rebase origin main || git reset --hard origin/main
              sleep $((i * 2))
            done
          fi

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-kbeauty-${{ github.run_id }}
          path: data/logs/
          retention-days: 7

  # K-Food: 로컬에서 실행 (Amazon 크롤링용 주거용 IP 필요)
  # 수동 실행만 가능 (workflow_dispatch)
  post-kfood:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'kculture' && github.event.inputs.category == 'K-Food'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
