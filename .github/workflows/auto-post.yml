name: Auto Blog Post

permissions:
  contents: write
  actions: write   # allow auto-rerun of WAF-blocked jobs on a fresh runner IP

on:
  # Manual trigger
  workflow_dispatch:
    inputs:
      mode:
        description: 'Blog mode'
        required: true
        default: 'general'
        type: choice
        options:
          - general
          - tech
          - kculture
          - queue
          - both
      topic:
        description: 'Specific topic (optional, skips trend detection)'
        required: false
        type: string
      publish:
        description: 'Publish immediately'
        required: false
        default: true
        type: boolean
      category:
        description: 'Filter by category (optional)'
        required: false
        type: string

  # Scheduled runs (UTC time)
  # GitHub Actions 지연 고려하여 30분 앞당김
  # ⚠️ General과 Tech는 15분 시간차로 실행 (동시 실행 시 호스팅 WAF 403 방지)
  schedule:
    # === General Blog (trendpulse.blog) - KST 기준 ===
    # ⏸ HN 트렌드 기반 일일 발행은 정지 유지 (2026-07-20 감사: 검색 수요 없는 토픽).
    #    재개하려면 아래 두 크론 주석 해제 — 단 머니 키워드 전략과 충돌하므로 비권장.
    # - cron: '30 23 * * *'  # 오전 08:30 KST
    # - cron: '30 10 * * *'  # 오후 19:30 KST
    # ▶ 머니 키워드 큐 발행 (생활정보: 세금·지원금·금융) - 주 3회로 감량 운영
    #   토픽은 data/topic_queue_general.json의 pending 항목 순서대로 소진
    - cron: '0 2 * * 1,3,5'  # 11:00 KST 월/수/금

    # === Tech Blog (bytepulse.io) - General과 15분 시간차 ===
    # 오전: 23:45 UTC (08:45 KST)
    - cron: '45 23 * * *'
    # 오후: 10:45 UTC (19:45 KST)
    - cron: '45 10 * * *'

    # === K-Culture (bytepulse.io) - KST 02:00~04:00 새벽 스케줄 ===
    # K-Pop: 월/수/금/토 새벽 (KST) = 일/화/목/금 17:00 UTC
    - cron: '0 17 * * 0,2,4,5'  # kpop
    # K-Beauty: 화/목/금/토 새벽 (KST) = 월/수/목/금 18:00 UTC
    - cron: '0 18 * * 1,3,4,5'  # kbeauty
    # K-Fashion: 목/금/토 새벽 (KST) = 수/목/금 19:00 UTC
    - cron: '0 19 * * 3,4,5'  # kfashion
    # K-Food: 로컬에서 실행 (Amazon 크롤링용 주거용 IP 필요)

jobs:
  post-general:
    # General 스케줄: 23:30 UTC, 10:30 UTC (Tech와 15분 시간차)
    # 외항사/K-Culture/Tech 스케줄에서는 실행하지 않음
    if: |
      github.event_name == 'workflow_dispatch' && (github.event.inputs.mode == 'general' || github.event.inputs.mode == 'both') ||
      (github.event_name == 'schedule' && (github.event.schedule == '30 23 * * *' || github.event.schedule == '30 10 * * *'))
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create .env file
        run: |
          cat << EOF > .env
          # Claude Agent SDK (OAuth token)
          CLAUDE_CODE_OAUTH_TOKEN=${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # LLM Fallbacks
          GOOGLE_AI_API_KEY=${{ secrets.GOOGLE_AI_API_KEY }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}

          # Image APIs
          UNSPLASH_ACCESS_KEY=${{ secrets.UNSPLASH_ACCESS_KEY }}
          PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}

          # WordPress - General Blog (trendpulse.blog)
          WP_GENERAL_URL=${{ secrets.WP_GENERAL_URL }}
          WP_GENERAL_USERNAME=${{ secrets.WP_GENERAL_USERNAME }}
          WP_GENERAL_APP_PASSWORD=${{ secrets.WP_GENERAL_APP_PASSWORD }}
          EOF

      - name: Run pipeline (General Blog - trendpulse.blog)
        timeout-minutes: 30
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          # Build command with optional flags
          CMD="python -m src.main --mode general --max-posts 1"

          # Add specific topic if provided (skips trend detection)
          if [ -n "${{ github.event.inputs.topic }}" ]; then
            CMD="$CMD --topic '${{ github.event.inputs.topic }}'"
          fi

          # Add publish flag: always publish for scheduled runs, or if manually requested
          if [ "${{ github.event_name }}" == "schedule" ] || [ "${{ github.event.inputs.publish }}" == "true" ]; then
            CMD="$CMD --auto-publish"
          fi

          # Add category filter if specified (manual trigger only)
          if [ -n "${{ github.event.inputs.category }}" ]; then
            CMD="$CMD --category '${{ github.event.inputs.category }}'"
          fi

          echo "Running: $CMD"
          eval $CMD

      - name: Commit post registry
        if: success()
        continue-on-error: true
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          [ -f "data/post_registry_general.json" ] || { echo "Registry not found; skipping"; exit 0; }
          git add data/post_registry_general.json
          if git diff --staged --quiet; then
            echo "No registry changes to commit"
            exit 0
          fi
          git commit -m "chore: update general post registry [skip ci]"
          for i in 1 2 3 4 5; do
            if git push origin main; then
              echo "Push succeeded on attempt $i"
              exit 0
            fi
            echo "Push failed; rebasing onto latest origin/main (attempt $i)..."
            git pull --rebase --autostash origin main || { git rebase --abort 2>/dev/null || true; }
            sleep $((i * 2))
          done
          echo "Warning: Failed to push registry after 5 attempts, but post was created successfully"

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-general-${{ github.run_id }}
          path: data/logs/
          retention-days: 7

