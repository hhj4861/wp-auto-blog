          GOOGLE_AI_API_KEY=${{ secrets.GOOGLE_AI_API_KEY }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          UNSPLASH_ACCESS_KEY=${{ secrets.UNSPLASH_ACCESS_KEY }}
          PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_API_KEY=${{ secrets.YOUTUBE_API_KEY }}
          WP_KCULTURE_URL=${{ secrets.WP_TECH_URL }}
          WP_KCULTURE_USERNAME=${{ secrets.WP_TECH_USERNAME }}
          WP_KCULTURE_APP_PASSWORD=${{ secrets.WP_TECH_APP_PASSWORD }}
          EOF

      - name: Run pipeline (K-Pop)
        timeout-minutes: 15
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          CMD="python -m src.main --mode kculture --category K-Pop --max-posts 1 --auto-publish"
          if [ -n "${{ github.event.inputs.topic }}" ]; then
            CMD="$CMD --topic '${{ github.event.inputs.topic }}'"
          fi
          echo "Running: $CMD"
          eval $CMD

      - name: Commit post registry
        if: success()
        continue-on-error: true
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          # Handle race condition with parallel workflows
          for i in 1 2 3; do
            git stash --include-untracked || true
            git pull --rebase origin main || true
            git stash pop || true
            git add data/post_registry_kculture.json
            git diff --staged --quiet && echo "No changes" && break
            git commit -m "chore: update kculture post registry (K-Pop) [skip ci]"
            git push && break || sleep $((i * 2))
          done

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-kpop-${{ github.run_id }}
          path: data/logs/
          retention-days: 7

