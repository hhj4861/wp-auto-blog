  # 외항사 포스팅 (토픽 큐에서 처리)
  post-queue:
    # 월/수/금 11:00 KST (02:00 UTC)에만 실행
    if: github.event.schedule == '0 2 * * 1,3,5'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
