          PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_API_KEY=${{ secrets.YOUTUBE_API_KEY }}
          WP_KCULTURE_URL=${{ secrets.WP_TECH_URL }}
          WP_KCULTURE_USERNAME=${{ secrets.WP_TECH_USERNAME }}
          WP_KCULTURE_APP_PASSWORD=${{ secrets.WP_TECH_APP_PASSWORD }}
          EOF

      - name: Run pipeline (K-Beauty)
        timeout-minutes: 15
