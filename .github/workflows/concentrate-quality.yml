name: Concentrate Quality (draft legacy)

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (대상만 보고)'
        required: true
        default: true
        type: boolean
      keep_slugs:
        description: '예외로 유지할 슬러그 (콤마 구분, 선택)'
        required: false
        type: string

jobs:
  concentrate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests
      - name: Concentrate quality
        env:
          WP_GENERAL_URL: ${{ secrets.WP_GENERAL_URL }}
          WP_GENERAL_USERNAME: ${{ secrets.WP_GENERAL_USERNAME }}
          WP_GENERAL_APP_PASSWORD: ${{ secrets.WP_GENERAL_APP_PASSWORD }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          KEEP_SLUGS: ${{ github.event.inputs.keep_slugs }}
        run: python scripts/concentrate_quality.py
