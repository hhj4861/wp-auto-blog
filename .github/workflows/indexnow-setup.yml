name: IndexNow Setup

permissions:
  contents: read

on:
  workflow_dispatch:
  schedule:
    # 매주 일요일 12:00 KST — 전체 사이트맵 재제출 (레이트리밋 자가 회복 겸 신선도 유지)
    - cron: '0 3 * * 0'

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests loguru

      - name: Setup IndexNow key and bulk ping
        env:
          WP_GENERAL_URL: ${{ secrets.WP_GENERAL_URL }}
          WP_GENERAL_USERNAME: ${{ secrets.WP_GENERAL_USERNAME }}
          WP_GENERAL_APP_PASSWORD: ${{ secrets.WP_GENERAL_APP_PASSWORD }}
        run: python scripts/setup_indexnow.py
