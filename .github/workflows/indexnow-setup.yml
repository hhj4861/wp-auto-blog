name: IndexNow Setup

permissions:
  contents: read

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests loguru

      - name: Setup IndexNow key and bulk ping
        env:
          WP_GENERAL_URL: ${{ secrets.WP_GENERAL_URL }}
          WP_GENERAL_USERNAME: ${{ secrets.WP_GENERAL_USERNAME }}
          WP_GENERAL_APP_PASSWORD: ${{ secrets.WP_GENERAL_APP_PASSWORD }}
        run: python scripts/setup_indexnow.py
