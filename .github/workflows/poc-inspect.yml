name: POC Inspect Latest Draft

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      status:
        description: '조회할 포스트 상태'
        required: false
        default: 'draft'
        type: string

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Dump latest post
        env:
          WP_GENERAL_URL: ${{ secrets.WP_GENERAL_URL }}
          WP_GENERAL_USERNAME: ${{ secrets.WP_GENERAL_USERNAME }}
          WP_GENERAL_APP_PASSWORD: ${{ secrets.WP_GENERAL_APP_PASSWORD }}
          POC_STATUS: ${{ github.event.inputs.status }}
        run: python scripts/dump_latest_post.py

      - name: Upload dump artifact
        uses: actions/upload-artifact@v4
        with:
          name: poc-dump
          path: poc_dump/
          retention-days: 7
