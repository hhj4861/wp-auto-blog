name: Publish Draft Post

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      post_id:
        description: '발행할 draft 포스트 ID'
        required: true
        type: string
      new_slug:
        description: '슬러그 교정 (선택, 영문 소문자-하이픈)'
        required: false
        type: string
      category:
        description: '정책 고지 삽입용 카테고리 (선택: 생활정보/취업/건강)'
        required: false
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests loguru

      - name: Publish post
        env:
          WP_GENERAL_URL: ${{ secrets.WP_GENERAL_URL }}
          WP_GENERAL_USERNAME: ${{ secrets.WP_GENERAL_USERNAME }}
          WP_GENERAL_APP_PASSWORD: ${{ secrets.WP_GENERAL_APP_PASSWORD }}
          POC_POST_ID: ${{ github.event.inputs.post_id }}
          POC_NEW_SLUG: ${{ github.event.inputs.new_slug }}
          POC_CATEGORY: ${{ github.event.inputs.category }}
        run: python scripts/publish_post.py
