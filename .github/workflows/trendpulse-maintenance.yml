name: TrendPulse Maintenance

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (변경 없이 대상만 보고)'
        required: true
        default: true
        type: boolean

jobs:
  maintain:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run maintenance
        env:
          WP_GENERAL_URL: ${{ secrets.WP_GENERAL_URL }}
          WP_GENERAL_USERNAME: ${{ secrets.WP_GENERAL_USERNAME }}
          WP_GENERAL_APP_PASSWORD: ${{ secrets.WP_GENERAL_APP_PASSWORD }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: python scripts/trendpulse_maintenance.py
